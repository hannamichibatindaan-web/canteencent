<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <style>
        :root { --p-green: #62ad86; --bg: #f4f9f4; --dark: #2d3436; }
        body { font-family: 'Segoe UI', sans-serif; margin: 0; background: #eee; display: flex; justify-content: center; padding: 20px; }
        
        #canteen-app { 
            width: 100%; max-width: 400px; background: var(--bg); border-radius: 30px; 
            overflow: hidden; box-shadow: 0 10px 25px rgba(0,0,0,0.2); position: relative; min-height: 600px;
        }

        .header { background: var(--p-green); color: white; padding: 20px; text-align: center; }
        .back-btn { position: absolute; left: 15px; top: 20px; background: none; border: none; color: white; font-size: 24px; cursor: pointer; display: none; }

        .screen { padding: 20px; display: none; }
        .active-screen { display: block !important; }

        /* Home UI */
        .budget-input-container { background: white; border-radius: 15px; padding: 15px; display: flex; margin: 20px 0; border: 1px solid #ddd; }
        .budget-input-container input { border: none; outline: none; width: 100%; font-size: 18px; }
        
        .main-btn { 
            background: var(--p-green); color: white; border: none; width: 100%; 
            padding: 15px; border-radius: 30px; font-weight: bold; cursor: pointer; font-size: 16px;
        }

        /* Menu UI */
        .tabs { display: flex; background: white; border-bottom: 1px solid #eee; }
        .tab { flex: 1; padding: 15px; text-align: center; cursor: pointer; font-weight: bold; color: #999; }
        .active-tab { color: var(--p-green); border-bottom: 3px solid var(--p-green); }

        .search-area { padding: 10px 20px; background: white; }
        .search-area input { width: 100%; padding: 10px; border-radius: 10px; border: 1px solid #eee; background: #f9f9f9; }

        #foodList { height: 350px; overflow-y: auto; padding: 15px; }
        .food-card { 
            background: white; padding: 12px; margin-bottom: 12px; border-radius: 15px; 
            display: flex; align-items: center; box-shadow: 0 2px 5px rgba(0,0,0,0.05);
            animation: fadeIn 0.3s ease;
        }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        
        .food-card img { width: 60px; height: 60px; border-radius: 10px; object-fit: cover; margin-right: 15px; background: #eee; }
        .food-info { flex: 1; }
        .food-info strong { display: block; font-size: 15px; }
        .food-info span { color: var(--p-green); font-weight: bold; }
    </style>
</head>
<body>

<div id="canteen-app">
    <div class="header">
        <button id="backBtn" class="back-btn" onclick="goBack()">‹</button>
        <h2 style="margin:0;">CanteenCents 👋</h2>
    </div>

    <div id="home-screen" class="screen active-screen">
        <h1 style="text-align:center; font-size: 22px;">Enter your daily allowance to see your options!</h1>
        <div class="budget-input-container">
            <span style="font-weight:bold; margin-right:10px;">₱</span>
            <input type="number" id="budgetInput" placeholder="How much do you have?">
        </div>
        <button class="main-btn" onclick="startApp()">View Affordable Meals</button>
        <p onclick="showHelp()" style="text-align:center; color: var(--p-green); cursor:pointer; text-decoration:underline; margin-top:20px;">Need Help?</p>
    </div>

    <div id="menu-screen" class="screen" style="padding:0;">
        <div style="background: #e1f5ea; padding: 10px; text-align: center; font-weight: bold; color: #27ae60;" id="budgetLabel"></div>
        <div class="tabs">
            <div class="tab active-tab" id="tab-meal" onclick="switchTab('meal')">Meals</div>
            <div class="tab" id="tab-snack" onclick="switchTab('snack')">Snacks</div>
            <div class="tab" id="tab-drink" onclick="switchTab('drink')">Drinks</div>
        </div>
        <div class="search-area">
            <input type="text" id="searchInput" placeholder="Search menu..." onkeyup="renderMenu()">
        </div>
        <div id="foodList"></div>
    </div>

    <div id="help-screen" class="screen">
        <h2>Help Center</h2>
        <p>1. Enter your budget.</p>
        <p>2. We hide items you can't afford.</p>
        <p>3. Switch tabs to see Snacks or Drinks!</p>
        <button class="main-btn" onclick="goBack()">Back</button>
    </div>
</div>

<script>
    let allowance = 0;
    let category = 'meal';

    const menuData = [
        /* MEALS */
        { name: "Chicken Pastil", price: 10, cat: "meal", img: "https://i.postimg.cc/hvwxGFxq/Chicken-Pastil-500x500.jpg" },
        { name: "Fried chicken", price: 35, cat: "meal", img: "https://i.postimg.cc/76ZTMPMm/image-91a15084-db68-45c4-9a9d-4782c5786175.png" },
        { name: "Pancit", price: 15, cat: "meal", img: "https://images.unsplash.com/photo-1585032226651-759b368d7246?w=100" },
        { name: "Rice", price: 10, cat: "meal", img: "https://images.unsplash.com/photo-1516684732162-798a0062be99?w=100" },
        { name: "Hotdog", price: 20, cat: "meal", img: "https://images.unsplash.com/photo-1516684732162-798a0062be99?w=100" },
        { name: "Giniling", price: 40, cat: "meal", img: "https://images.unsplash.com/photo-1516684732162-798a0062be99?w=100" },
        { name: "Barbeque", price: 15, cat: "meal", img: "https://via.placeholder.com/100?text=BBQ" },
        { name: "Adobong Manok", price: 15, cat: "meal", img: "https://via.placeholder.com/100?text=Adobo" },
        { name: "Liver w/ Egg & Rice", price: 45, cat: "meal", img: "https://via.placeholder.com/100?text=Liver" },
        { name: "Isaw", price: 5, cat: "meal", img: "https://via.placeholder.com/100?text=Isaw" },
        { name: "Egg", price: 10, cat: "meal", img: "https://via.placeholder.com/100?text=Egg" },
        
        /* SNACKS */
        { name: "Piattos", price: 20, cat: "snack", img: "https://images.unsplash.com/photo-1566478989037-eec170784d0b?w=100" },
        { name: "Turon", price: 10, cat: "snack", img: "https://images.unsplash.com/photo-1590005354167-6da97870c91c?w=100" },
        { name: "Bingo", price: 10, cat: "snack", img: "https://via.placeholder.com/100?text=Snack" },
        { name: "Combi", price: 10, cat: "snack", img: "https://via.placeholder.com/100?text=Snack" },
        { name: "Kwek-Kwek", price: 25, cat: "snack", img: "https://via.placeholder.com/100?text=Snack" },
      { name: "Corndog", price: 10, cat: "snack", img: "https://via.placeholder.com/100?text=Snack" },
      { name: "Cheezy", price: 40, cat: "snack", img: "https://via.placeholder.com/100?text=Snack" },

        { name: "Fudgee Bar", price: 10, cat: "snack", img: "https://via.placeholder.com/100?text=Cake" },
        { name: "Nova", price: 20, cat: "snack", img: "https://via.placeholder.com/100?text=Nova" },
        { name: "Empanada", price: 15, cat: "snack", img: "https://via.placeholder.com/100?text=Lomi" },
        { name: "Stick O (3 for 10)", price: 10, cat: "snack", img: "https://via.placeholder.com/100?text=StickO" },
    { name: "Donut", price: 15, cat: "snack", img: "https://via.placeholder.com/100?text=StickO" },
        
        /* DRINKS */
        { name: "Nestea", price: 10, cat: "drink", img: "https://images.unsplash.com/photo-1613478223719-2ab80260f0a4?w=100" },
        { name: "Buko Juice", price: 10, cat: "drink", img: "https://images.unsplash.com/photo-1525385133336-247843236bc8?w=100" },
         { name: "Avocado Juice", price: 10, cat: "drink", img: "https://images.unsplash.com/photo-1525385133336-247843236bc8?w=100" },
        { name: "Mineral Water", price: 15, cat: "drink", img: "https://images.unsplash.com/photo-1548839140-29a749e1cf4d?w=100" },
        { name: "Cucumber Juice", price: 10, cat: "drink", img: "https://images.unsplash.com/photo-1548839140-29a749e1cf4d?w=100" },
         { name: "Tapioca", price: 25, cat: "drink", img: "https://images.unsplash.com/photo-1548839140-29a749e1cf4d?w=100" },
        { name: "Ice Coffee", price: 35, cat: "drink", img: "https://images.unsplash.com/photo-1517701604599-bb29b565090c?w=100" },
         { name: "Wintermelon Juice", price: 10, cat: "drink", img: "https://images.unsplash.com/photo-1517701604599-bb29b565090c?w=100" },
        { name: "Halo Halo", price: 30, cat: "drink", img: "https://via.placeholder.com/100?text=Halo" }
    ];

    function startApp() {
        const val = document.getElementById('budgetInput').value;
        if (!val || val <= 0) { alert("Please enter your budget first!"); return; }
        
        allowance = parseFloat(val);
        
        // Hide Home, Show Menu
        document.getElementById('home-screen').classList.remove('active-screen');
        document.getElementById('menu-screen').classList.add('active-screen');
        document.getElementById('backBtn').style.display = 'block';
        
        document.getElementById('budgetLabel').innerText = "BUDGET: ₱" + allowance.toFixed(2);
        renderMenu();
    }

    function switchTab(cat) {
        category = cat;
        document.querySelectorAll('.tab').forEach(t => t.classList.remove('active-tab'));
        document.getElementById('tab-' + cat).classList.add('active-tab');
        renderMenu();
    }

    function renderMenu() {
        const list = document.getElementById('foodList');
        const search = document.getElementById('searchInput').value.toLowerCase();
        list.innerHTML = "";

        const filtered = menuData.filter(item => 
            item.cat === category && 
            item.price <= allowance && 
            item.name.toLowerCase().includes(search)
        );

        if (filtered.length === 0) {
            list.innerHTML = `<div style="text-align:center; margin-top:50px; color:#999;">
                <p>No ${category}s found within ₱${allowance}.</p>
                <p style="font-size:12px;">Try increasing your budget!</p>
            </div>`;
        } else {
            filtered.forEach(item => {
                list.innerHTML += `
                <div class="food-card">
                    <img src="${item.img}" onerror="this.src='https://via.placeholder.com/100?text=Food'">
                    <div class="food-info">
                        <strong>${item.name}</strong>
                        <span>₱${item.price.toFixed(2)}</span>
                    </div>
                    <div style="font-size:10px; color:#27ae60; background:#e1f5ea; padding:4px 8px; border-radius:5px; font-weight:bold;">FIT</div>
                </div>`;
            });
        }
    }

    function showHelp() {
        document.getElementById('home-screen').classList.remove('active-screen');
        document.getElementById('help-screen').classList.add('active-screen');
        document.getElementById('backBtn').style.display = 'block';
    }

    function goBack() {
        document.getElementById('menu-screen').classList.remove('active-screen');
        document.getElementById('help-screen').classList.remove('active-screen');
        document.getElementById('home-screen').classList.add('active-screen');
        document.getElementById('backBtn').style.display = 'none';
        document.getElementById('searchInput').value = "";
    }
</script>

</body>
  </html>
